<!DOCTYPE html>
<html lang="en-GB">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>

    <!-- Dynamically resolves /style.css at the site root -->
    <link rel="stylesheet" href="{{ '/style.css' | relative_url }}">
</head>
<body>

    <!-- Site Header -->
    <header>
        <h1>{{ site.title }}</h1>
        <p>{{ site.description }}</p>
    </header>

    <!-- Navigation Menu -->
    <nav>
        <ul>
            <li><a href="{{ '/' | relative_url }}">Home</a></li>
            <li><a href="{{ '/classes/class-6/class-6.html' | relative_url }}">Class 6</a></li>
        </ul>
    </nav>

    <!-- Main Content Area -->
    <main class="container">
        {{ content }}
    </main>

    <!-- Site Footer -->
    <footer>
        <p>&copy; {{ 'now' | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
    </footer>

</body>
</html>
