<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | St Eanswythe's C of E Primary School</title>
    
    <!-- Link to your master stylesheet with the cache buster updated to v=2 -->
    <link rel="stylesheet" href="/style.css?v=2">
</head>
<body>

    <!-- Global Header (Edit this once, updates everywhere) -->
    <header>
        <div class="header-container">
            <!-- Ensure your logo doesn't have inline styles stretching it, since we removed the global !important rule -->
            <img src="/images/school-logo.png" alt="St Eanswythe's Logo" class="school-logo">
            <nav>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/our-christian-vision.html">Our Vision</a></li>
                    <!-- Your other menu items -->
                </ul>
            </nav>
        </div>
    </header>

    <!-- The magic Jekyll tag that pulls in page-specific content -->
    <main>
        {{ content }}
    </main>

    <!-- Global Footer (Edit this once, updates everywhere) -->
    <footer>
        <div class="footer-container">
            <p>&copy; 2026 St Eanswythe's C of E Primary School, Folkestone. All rights reserved.</p>
            <!-- Your footer links and buttons -->
        </div>
    </footer>

</body>
</html>
